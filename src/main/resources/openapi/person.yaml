openapi: 3.0.1
info:
  title: Registration & Login API
  version: 1.0.0

components:
  securitySchemes:
    keycloak:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: "http://localhost:8080/realms/life-tracker/protocol/openid-connect/auth"
          scopes:
            ZielCreator: "Darf Ziele erstellen"

  schemas:
    Registration:
      type: object
      properties:
        vorname:
          type: string
        nachname:
          type: string
        email:
          type: string
        geburtsdatum:
          type: string
        land:
          type: string
        passwort:
          type: string
      required:
        - vorname
        - nachname
        - email
        - passwort

    Login:
      type: object
      properties:
        email:
          type: string
        passwort:
          type: string
      required:
        - email
        - passwort

    Ziel:
      type: object
      properties:
        email:
          type: string
        title:
          type: string
        description:
          type: string
      required:
        - email
        - title
        - description

paths:

  /api/registration/save:
    post:
      tags:
        - Registration
      summary: Speichert eine Registration in Keycloak
      operationId: saveRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Registration'
      responses:
        '200':
          description: OK

  /api/login:
    post:
      tags:
        - Login
      summary: Login eines Benutzers
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

        '401':
          description: Ungültige Zugangsdaten
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /api/ziel:
    post:
      tags:
        - Ziel
      summary: Ziel eines Benutzers
      operationId: addGoal
      security:
        - keycloak:
            - ZielCreator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ziel'
      responses:
        '200':
          description: Ziel erfolgreich gespeichert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ziel'
        '401':
          description: Ziel nicht gespeichert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ziel'

  /api/ziele:
    get:
      tags:
        - Ziel
      summary: Liste aller Ziele eines Benutzers
      operationId: getGoalsByEmail
      security:
        - keycloak:
            - ZielCreator
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
          description: E-Mail des Benutzers, dessen Ziele abgefragt werden sollen
      responses:
        '200':
          description: Liste der Ziele
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ziel'
        '404':
          description: Keine Ziele gefunden
        '401':
          description: Nicht autorisiert
